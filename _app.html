    <script>
      (function() {
        // Define global if missing
        if (typeof global === 'undefined') {
          window.global = window;
        }
        // Define process if missing
        if (typeof process === 'undefined') {
          window.process = { env: {} };
        }
        
        // Protect fetch from being overwritten and prevent "getter only" errors
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { 
              console.warn('Blocked attempt to overwrite window.fetch'); 
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.debug('Fetch redefinition failed (likely already protected):', e);
        }

        // Suppress the specific TypeError if it still occurs from third-party scripts
        window.addEventListener('error', function(event) {
          if (event.message && event.message.includes('Cannot set property fetch of #<Window>')) {
            event.preventDefault();
            console.warn('Suppressed fetch overwrite error from third-party script.');
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
